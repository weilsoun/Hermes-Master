version: "3.9"

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-agent
    restart: unless-stopped

    # ── NO LIMITATIONS ──────────────────────────────────────────────────
    privileged: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    cap_add:
      - ALL

    # ── Persistent storage — bind mounts into ./data/ ───────────────────
    # All data lives in the Hermes-Master/data/ folder next to this file.
    # Back up that folder = back up everything.
    volumes:
      - ./data/opt-data:/opt/data               # Hermes brain: memory, skills, sessions, config
      - ./data/hermes:/root/.hermes             # Company KB, env file, task log
      - ./data/config:/root/.config             # GitHub CLI auth (gh)
      - ./data/workspace:/workspace             # All Git repos
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker access

    # ── Ports ───────────────────────────────────────────────────────────
    ports:
      - "3000:3000"   # ARIA dashboard (Factor1Digital company AI)

    # ── Environment ─────────────────────────────────────────────────────
    env_file:
      - .env

    environment:
      - HERMES_HOME=/opt/data
      - TERMINAL_TIMEOUT=0
      - TERMINAL_LIFETIME_SECONDS=0

    # Interactive TTY for CLI usage
    stdin_open: true
    tty: true
